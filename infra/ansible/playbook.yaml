---
- name: Prepare Debian VM for Docker services
  hosts: local_vm
  become: yes
  gather_facts: yes
  
  vars:
    docker_users:
      - vagrant
  
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: always
    
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - git
          - vim
        state: present
      tags: prerequisites

    # ... (тут залишаються твої таски по встановленню Docker із попереднього файлу) ...
    # Я пропущу блок встановлення Docker для лаконічності, але він має бути тут.

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: docker

    # --- НОВИЙ БЛОК: DEPLOY DOCKER STACK ---
    
    - name: Ensure .env file exists
      copy:
        src: /vagrant/.env.example
        dest: /vagrant/.env
        remote_src: yes
        force: no
      tags: app-deploy

    - name: Set executable permissions on init-db script
      file:
        path: /vagrant/infra/init-db.sh
        mode: '0755'
      tags: app-deploy

    - name: Pull and Start Docker Compose Services
      shell: |
        cd /vagrant
        docker compose up -d
      become: yes
      tags: app-deploy

  post_tasks:
    - name: Verify Services are running
      command: docker ps
      register: docker_status
      tags: always

    - name: Final completion message
      debug:
        msg: 
          - "========================================"
          - " Infrastructure is UP and Running!"
          - "========================================"
          - "{{ docker_status.stdout }}"
